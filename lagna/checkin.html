<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Wedding Check-in · Deepali & Inderdip</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="stylesheet" href="checkin.css?v=20260714-1" />
</head>
<body>
  <main class="checkin-shell">
    <header>
      <p class="eyebrow">Private venue tool</p>
      <h1>Wedding Check-in</h1>
      <p>Scan the family QR pass to welcome guests and confirm their RSVP count.</p>
    </header>

    <section id="loginPanel" class="panel">
      <h2>Security access</h2>
      <form id="loginForm">
        <label for="checkinPin">Check-in PIN
          <input id="checkinPin" inputmode="numeric" autocomplete="current-password" minlength="6" maxlength="12" required />
        </label>
        <button type="submit">Open check-in scanner</button>
        <p id="loginStatus" role="status"></p>
      </form>
    </section>

    <section id="checkinApp" hidden>
      <div class="panel camera-panel">
        <div class="camera-heading"><h2>Scan family QR pass</h2><button id="lockButton" class="text-button" type="button">Lock</button></div>
        <div id="qrReader" hidden></div>
        <video id="camera" autoplay muted playsinline></video>
        <p id="cameraStatus" role="status">Camera is off.</p>
        <button id="cameraButton" type="button">Start camera</button>
      </div>

      <section class="panel manual-panel">
        <h2>Manual fallback</h2>
        <form id="manualForm">
          <label for="tokenInput">Check-in token
            <input id="tokenInput" placeholder="CHK-…" autocapitalize="characters" autocomplete="off" />
          </label>
          <button type="submit">Check token</button>
        </form>
      </section>

      <section id="result" class="result" aria-live="assertive"></section>
    </section>
  </main>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="checkin.js?v=20260714-2"></script>
</body>
</html>
